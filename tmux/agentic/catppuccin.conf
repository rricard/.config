# Catppuccin Latte (light) / Frappe (dark) colors for tmux
# Colors sourced from https://github.com/catppuccin/tmux (no plugin required)
if-shell "$XDG_CONFIG_HOME/bin/detect-system-theme | grep -q light" \
  "set -g status-style 'bg=#e6e9ef fg=#4c4f69'; \
   set -g window-status-style 'fg=#6c6f85'; \
   set -g window-status-current-style 'fg=#4c4f69 bold'; \
   set -g pane-border-style 'fg=#bcc0cc'; \
   set -g pane-active-border-style 'fg=#1e66f5'; \
   set -g message-style 'bg=#9ca0b0 fg=#179299'; \
   set -g mode-style 'bg=#ccd0da bold'; \
   set -g clock-mode-colour '#1e66f5'; \
   set -g window-style 'bg=#eff1f5 fg=#4c4f69'; \
   set -g window-active-style 'bg=#eff1f5 fg=#4c4f69'" \
  "set -g status-style 'bg=#292c3c fg=#c6d0f5'; \
   set -g window-status-style 'fg=#838ba7'; \
   set -g window-status-current-style 'fg=#c6d0f5 bold'; \
   set -g pane-border-style 'fg=#51576d'; \
   set -g pane-active-border-style 'fg=#8caaee'; \
   set -g message-style 'bg=#737994 fg=#81c8be'; \
   set -g mode-style 'bg=#414559 bold'; \
   set -g clock-mode-colour '#8caaee'; \
   set -g window-style 'bg=#303446 fg=#c6d0f5'; \
   set -g window-active-style 'bg=#303446 fg=#c6d0f5'"
