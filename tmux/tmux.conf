# 24-bit true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Mouse support
set -g mouse on

# Forward focus events to applications (needed for vim autoread)
set -g focus-events on

# Forward window titles to terminal emulator
set -g set-titles on
set -g set-titles-string "#S - #T"

# Disable pane border status (titles shown on each pane border)
set -g pane-border-status off

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim keys in copy mode
set -g mode-keys vi

# New splits windows open in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar on top
set -g status-position top

set -g status-right "%d/%m/%y %Z %H:%M #H"

source $XDG_CONFIG_HOME/tmux/vendored/catppuccin-tmux/catppuccin_options_tmux.conf

if-shell "$XDG_CONFIG_HOME/bin/detect-system-theme | grep -q light" \
  "set -g @catppuccin_flavor 'latte'" \
  "set -g @catppuccin_flavor 'frappe'"

source $XDG_CONFIG_HOME/tmux/vendored/catppuccin-tmux/catppuccin_tmux.conf

# Set pane background/foreground to match catppuccin flavor
set -g window-style "bg=#{@thm_bg} fg=#{@thm_fg}"
set -g window-active-style "bg=#{@thm_bg} fg=#{@thm_fg}"
