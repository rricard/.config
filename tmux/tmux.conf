# Mouse support
set -g mouse on

# Forward focus events to applications (needed for vim autoread)
set -g focus-events on

# Forward window titles to terminal emulator
set -g set-titles on
set -g set-titles-string "#S - #T"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim keys in copy mode
set -g mode-keys vi

# New splits windows open in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar on top
set -g status-position top

# Muted status bar (replaces the default aggressive green)
set -g status-style 'bg=#dddddd fg=#555555'
set -g window-status-current-style 'fg=#3366aa bold'
set -g window-status-style 'fg=#999999'
set -g window-status-format ' #I  #W'
set -g window-status-current-format '[#I] #W'
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#88aadd'
set -g message-style 'bg=#303030 fg=#aaaaaa'
