# 24-bit true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Mouse support
set -g mouse on

# Forward focus events to applications (needed for vim autoread)
set -g focus-events on

# Forward window titles to terminal emulator
set -g set-titles on
set -g set-titles-string "#S - #T"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim keys in copy mode
set -g mode-keys vi

# New splits windows open in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar on top
set -g status-position top

set -g window-status-format ' #I: #W '
set -g window-status-current-format '[#I: #W]'
set -g status-right "%d/%m/%y %Z %H:%M #H"

if-shell "$XDG_CONFIG_HOME/bin/detect-system-theme | grep -q light" \
  "source $XDG_CONFIG_HOME/tmux/light.conf" \
  "source $XDG_CONFIG_HOME/tmux/dark.conf"
